<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sudoku</title>
<style>
body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f5f5f7;
    text-align:center;
    margin:20px;
}
h1{color:#333;}
#board{
    display:grid;
    grid-template-columns:repeat(9,40px);
    gap:2px;
    justify-content:center;
    margin:20px auto;
}
input{
    width:40px;
    height:40px;
    text-align:center;
    font-size:22px;
}
.fixed{
    background:#ddd;
    font-weight:bold;
}
button{
    padding:12px 20px;
    margin:10px;
    font-size:18px;
}
</style>
</head>

<body>

<h1>🧩 Sudoku</h1>

<div id="board"></div>

<button onclick="check()">정답 확인</button>

<p id="msg"></p>

<script>

const answer=[
[5,3,4,6,7,8,9,1,2],
[6,7,2,1,9,5,3,4,8],
[1,9,8,3,4,2,5,6,7],
[8,5,9,7,6,1,4,2,3],
[4,2,6,8,5,3,7,9,1],
[7,1,3,9,2,4,8,5,6],
[9,6,1,5,3,7,2,8,4],
[2,8,7,4,1,9,6,3,5],
[3,4,5,2,8,6,1,7,9]
];

const puzzle=[
[5,0,0,0,7,0,0,0,0],
[6,0,0,1,9,5,0,0,0],
[0,9,8,0,0,0,0,6,0],
[8,0,0,0,6,0,0,0,3],
[4,0,0,8,0,3,0,0,1],
[7,0,0,0,2,0,0,0,6],
[0,6,0,0,0,0,2,8,0],
[0,0,0,4,1,9,0,0,5],
[0,0,0,0,8,0,0,7,9]
];

const board=document.getElementById("board");

for(let r=0;r<9;r++){
    for(let c=0;c<9;c++){
        let cell=document.createElement("input");
        cell.maxLength=1;

        if(puzzle[r][c]!=0){
            cell.value=puzzle[r][c];
            cell.disabled=true;
            cell.className="fixed";
        }

        cell.id=r+"-"+c;

        board.appendChild(cell);
    }
}

function check(){

let ok=true;

for(let r=0;r<9;r++){
for(let c=0;c<9;c++){

let v=document.getElementById(r+"-"+c).value;

if(Number(v)!=answer[r][c]){
ok=false;
}

}
}

document.getElementById("msg").innerHTML=
ok?"🎉 축하합니다!":"❌ 아직 틀린 곳이 있습니다.";

}

</script>

</body>
</html>
